<!DOCTYPE html>
<html lang="vi" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Shop TRC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { height: 100vh; background-color: #1e293b; border-right: 1px solid #334155; }
        .nav-link { color: #cbd5e1; border-radius: 8px; margin-bottom: 5px; }
        .nav-link:hover, .nav-link.active { background-color: #3b82f6; color: white; }
        .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .text-brand { color: #60a5fa; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 d-none d-md-block sidebar p-3 position-fixed">
                <h4 class="text-brand text-center mb-4"><i class="fa-solid fa-gem"></i> SHOP PANEL</h4>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="fa-solid fa-house me-2"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/users"><i class="fa-solid fa-users me-2"></i> Người dùng</a></li>
                    <li class="nav-item"><a class="nav-link" href="/codes"><i class="fa-solid fa-gift me-2"></i> Mã sự kiện</a></li>
                    <li class="nav-item mt-5"><a class="nav-link text-danger" href="/logout"><i class="fa-solid fa-right-from-bracket me-2"></i> Đăng xuất</a></li>
                </ul>
            </div>
            
            <div class="col-md-10 offset-md-2 p-4">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
</body>
</html>
