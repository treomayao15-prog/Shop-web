{% extends "layout.html" %}
{% block content %}
<h2 class="mb-4">Danh Sách Người Dùng</h2>
<div class="card p-3 table-responsive">
    <table class="table table-dark table-hover align-middle">
        <thead><tr><th>ID</th><th>Telegram ID</th><th>Tên</th><th>Username</th><th>Tham gia</th></tr></thead>
        <tbody>
            {% for u in users %}
            <tr>
                <td>{{ u['id'] }}</td>
                <td>{{ u['telegram_id'] }}</td>
                <td>{{ u['name'] }}</td>
                <td>@{{ u['username'] }}</td>
                <td>{{ u['created_at'] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
